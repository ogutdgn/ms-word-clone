<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; img-src 'self' data: blob:; style-src 'self' 'unsafe-inline'; script-src 'self'; font-src 'self'">
  <title>Document1 - Word</title>
  <link rel="stylesheet" href="/styles/base.css">
  <link rel="stylesheet" href="/styles/titlebar.css">
  <link rel="stylesheet" href="/styles/ribbon.css">
  <link rel="stylesheet" href="/styles/backstage.css">
  <link rel="stylesheet" href="/styles/editor.css">
  <link rel="stylesheet" href="/styles/dialogs.css">
</head>
<body>
  <div id="app">
    <header id="titlebar"></header>
    <nav id="tabstrip"></nav>
    <div id="ribbon"></div>

    <div id="workarea" class="view-print">
      <div id="ruler"><div class="ruler-inner"><div class="ruler-track"></div></div></div>
      <div id="canvas">
        <div id="pages">
          <div id="editor" contenteditable="true" spellcheck="true"><p><br></p></div>
        </div>
      </div>
    </div>

    <footer id="statusbar"></footer>

    <div id="backstage" hidden></div>
  </div>

  <div id="modal-root"></div>

  <!-- net recorder (must load FIRST so it observes load-time requests) -->
  <script src="/js/00-netlog.js"></script>
  <!-- vendor -->
  <script src="/vendor/purify.min.js"></script>
  <!-- app modules (classic scripts, dependency order) -->
  <script src="/js/icons-fluent.js"></script>
  <script src="/js/icons.js"></script>
  <script src="/js/util.js"></script>
  <script src="/js/ribbon-data.js"></script>
  <script src="/js/editor.js"></script>
  <script src="/js/formatting.js"></script>
  <script src="/js/statusbar.js"></script>
  <script src="/js/home-features.js"></script>
  <script src="/js/insert-features.js"></script>
  <script src="/js/table-tools.js"></script>
  <script src="/js/header-footer.js"></script>
  <script src="/js/draw-tools.js"></script>
  <script src="/js/design-tools.js"></script>
  <script src="/js/layout-tools.js"></script>
  <script src="/js/references-tools.js"></script>
  <script src="/js/mailings-tools.js"></script>
  <script src="/js/review-tools.js"></script>
  <script src="/js/dialogs.js"></script>
  <script src="/js/comments.js"></script>
  <script src="/js/commands.js"></script>
  <script src="/js/ribbon.js"></script>
  <script src="/js/files.js"></script>
  <script src="/js/backstage.js"></script>
  <script src="/js/app.js"></script>
  <!-- Phase 1 new-core ESM entry (must load LAST, after window.WC is built) -->
  <script type="module" src="./main.ts"></script>
</body>
</html>
